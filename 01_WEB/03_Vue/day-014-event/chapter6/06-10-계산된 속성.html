<html>
  <head>
    <style>
      .warnimage {
        width: 18px;
        height: 18px;
        position: relative;
      }
      .score {
        border: solid 1px black;
      }
      .warning {
        background-color: skyblue;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div>
        <p>1부터 100까지만 입력가능합니다.</p>
        <div>
          점수:
          <input
            type="text"
            class="score"
            v-model.number="score"
            :class="info"
          />
        </div>
        <img
          src="https://contactsvc.bmaster.kro.kr/img/error.png"
          class="warnimage"
          v-if="info.warning"
          title="1부터 100까지만 입력하세요."
        />
      </div>
    </div>
    <script src="https://unpkg.com/vue"></script>
    <script type="text/javascript">
      let vm = Vue.createApp({
        name: 'App',
        data() {
          return { score: 50 };
        },
        computed: {
          info() {
            return { warning: this.score < 1 || this.score > 100 };
          },
        },
      }).mount('#app');
    </script>
  </body>
</html>
