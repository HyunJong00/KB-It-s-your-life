<!doctype html>
<html>
  <head>
    <style>
      div {
        display: inline-block;
        width: 50px;
        height: 50px;
        border: 1px solid lightgray;
        text-align: center;
        color: white;
        background: red;
      }
      #down:hover {
        position: relative; /* relative 나를 기준으로 하겠다 */
        left: 20px;
        top: 20px;
        background-color: green;
      }
      #up:hover {
        position: relative;
        right: -20px; /*left:-20px*/
        bottom: 20px; /*top:-20px*/
        background: blue;
      }
    </style>
  </head>
  <body>
    <h3>상대배치, relative</h3>
    <hr />
    <div>T</div>
    <div id="down">h</div>
    <div>a</div>
    <div>n</div>
    <div id="up">k</div>
    <div>s</div>
  </body>
</html>
