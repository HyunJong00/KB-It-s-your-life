<!doctype html>
<html>
  <head>
    <style>
      span > span {
        visibility: hidden;
      }
      li > span:hover span {
        visibility: visible;
        color: red;
      }
    </style>
  </head>
  <body>
    <h3>다음 빈 곳에 숨은 단어?</h3>
    <hr />
    <ul>
      <li>
        <!-- hidden이 될 경우 action도 안됨 -->
        I (<span><span>love</span></span
        >) you.
      </li>
      <li>
        CSS is Cascading (<span><span>Style</span></span
        >) Sheet.
      </li>

      <li>
        응답하라 (<span><span>1988</span></span
        >).
      </li>
    </ul>
  </body>
</html>
