<!doctype html>
<html>
  <head>
    <style>
      img {
        width: 100%;
        height: 100%;
        transition: all 1s ease;
      }
      .imgDiv {
        border: solid 2px pink;
        width: 150px;
        height: 150px;
        margin: auto;
        overflow: hidden;
      }
      .imgDiv:hover img {
        transform: scale(1.4);
      }
    </style>
  </head>
  <body>
    <div class="imgDiv">
      <img src="./images/망상토끼.gif" alt="망상토끼" />
    </div>
  </body>
</html>
