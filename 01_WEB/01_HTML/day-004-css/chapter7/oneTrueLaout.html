<!doctype html>
<html>
  <head>
    <style>
      body {
        width: 500px; /* 대규모 사이트는 반응형이 아닌 고정으로 사용함*/
        margin: 10px auto;
      }
      #middle {
        overflow: hidden;
      }
      #left {
        float: left;
        width: 150px;
        background-color: red;
      }
      #right {
        float: left;
        width: 350px;
        background-color: blue;
      }
      #top {
        background-color: green;
      }
      #bottom {
        background-color: purple;
      }
    </style>
  </head>
  <body>
    <div id="top">Lorem ipsum dolor sit amet, ...</div>
    <div id="middle">
      <div id="left">
        Lorem ipsum dolor sit amet, consectetur adipiscing elit.
      </div>
      <div id="right">
        Lorem ipsum dolor sit amet, consectetur adipiscing elit. ...
      </div>
    </div>
    <div id="bottom">Lorem ipsum dolor sit amet, ...</div>
  </body>
</html>
