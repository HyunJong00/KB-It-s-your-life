<!doctype html>
<html>
  <head>
    <script>
      let hours = new Date().getHours();
      console.log('hours: ' + hours);
      if (hours < 5) {
        alert('잠을 자렴...');
      } else if (hours < 7) {
        alert('준비');
      } else if (hours < 9) {
        alert('출근');
      } else if (hours < 12) {
        alert('빈둥 빈둥');
      } else if (hours < 14) {
        alert('식사');
      } else {
        ('여러 가지 업무를 수행합니다.');
      }
    </script>
  </head>
</html>
