<!doctype html>
<html>
  <head>
    <script>
      function callTimes(callback, n = 1) {
        for (let i = 0; i < n; i++) {
          callback();
        }
      }
      let alertFunction = function () {
        alert('함수 호출');
      };
      callTimes(alertFunction);
    </script>
  </head>
</html>
